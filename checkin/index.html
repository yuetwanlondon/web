<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Check-in · Yuet Wan London</title>
<link rel="icon" type="image/png" href="/img/yuetwanlondon-favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--ink:#16130F;--paper:#F4ECDD;--mist:#F6F3EE;--brass:#B8893C;--vermilion:#C8402E;--line:rgba(22,19,15,.14);
  --green:#2f7a3a;--green-bg:#e5f3e6;--amber:#a9721a;--amber-bg:#fbf1da;--red:#a8331f;--red-bg:#f5e2de;--grot:"Plus Jakarta Sans",system-ui,sans-serif}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--mist);color:var(--ink);font-family:var(--grot);line-height:1.5}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
.top{background:var(--ink);color:var(--paper);display:flex;align-items:center;gap:10px;padding:12px 18px}
.top img{height:24px;filter:brightness(0) invert(1)}
.top .t{font-weight:800;font-size:15px}
.top .t small{font-weight:600;opacity:.7;margin-left:4px}
.wrap{max-width:520px;margin:0 auto;padding:20px 16px 60px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px}
h1{font-size:20px;margin:0 0 4px}
.sub{color:#6d655c;font-size:14px;margin-bottom:14px}
.in{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:16px;font-family:inherit}
.in:focus{outline:none;border-color:var(--brass)}
.btn{border:1px solid var(--brass);background:#fff;color:#6d563a;border-radius:30px;padding:13px 20px;font-size:15px;font-weight:600;width:100%}
.btn.dark{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.btn.green{background:var(--green);border-color:var(--green);color:#fff}
.btn.ghost{border-color:var(--line);color:#6d655c}
.gate{margin-top:12px;background:var(--red-bg);border:1px solid rgba(168,51,31,.3);color:var(--red);border-radius:10px;padding:11px 14px;font-size:13.5px}
#reader{width:100%;border-radius:14px;overflow:hidden;margin-bottom:12px;background:#000;min-height:60px}
.or{text-align:center;color:#9a9186;font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin:14px 0}
.row{display:flex;gap:8px}.row .in{flex:1}.row .btn{width:auto;white-space:nowrap}
.review{border-radius:16px;padding:20px;border:2px solid var(--line);background:#fff;margin-bottom:14px;text-align:center}
.review .pay{font-size:26px;font-weight:800;margin:0 0 2px}
.review.g{border-color:var(--green)}.review.g .pay{color:var(--green)}
.review.a{border-color:var(--amber)}.review.a .pay{color:var(--amber)}
.review .who{font-size:22px;font-weight:700;margin:10px 0 2px}
.review .det{font-size:15px;color:#4a423a}
.review .seatline{font-size:17px;font-weight:700;background:#f3ece0;border-radius:10px;padding:9px;margin:12px 0}
.warn{background:#fff4d6;border:1px solid rgba(169,114,26,.4);color:#8a6410;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center}
.result{border-radius:16px;padding:26px 20px;text-align:center;margin-bottom:14px;border:2px solid}
.result .status{font-size:30px;font-weight:800;margin:0 0 4px}
.result.g{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.result.r{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.acts{display:flex;gap:9px}.acts .btn{flex:1}
</style>
</head>
<body>
<div class="top"><img src="/img/yuetwanlondon-icon.svg" alt=""><div class="t">Yuet Wan London<small>Check-in</small></div></div>
<div class="wrap">

  <div id="blocked" class="card hidden">
    <h1>Check-in link needed</h1>
    <div class="sub">This page opens from the check-in link your organiser shares. Please ask them for the link that includes the access code.</div>
  </div>

  <div id="scan" class="hidden">
    <div id="stage"></div>
    <div class="card" id="scanCard">
      <h1>Scan a ticket</h1>
      <div class="sub">Point the camera at the QR on the guest's ticket, or type their reference.</div>
      <div id="reader"></div>
      <button class="btn" id="camToggle">Start camera</button>
      <div class="or">or enter reference</div>
      <div class="row"><input class="in" id="manual" placeholder="YW260901-XXXX" autocapitalize="characters"><button class="btn dark" id="lookupBtn">Find</button></div>
    </div>
  </div>

</div>

<script>
const BOOK_API="https://script.google.com/macros/s/AKfycbylfZEOHp8Zngus5S033z2qdARaZJJg8PaDd2dElqntQYIrn8IzFSE3N1jjfvYX3PNUTQ/exec";
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
async function post(p){const r=await fetch(BOOK_API,{method:"POST",body:JSON.stringify(p)});return r.json();}
var KEY=new URLSearchParams(location.search).get("key")||"";
var scanner=null,camOn=false,busy=false,CUR=null;

if(!KEY){ $("blocked").classList.remove("hidden"); } else { $("scan").classList.remove("hidden"); }

$("camToggle").onclick=function(){ camOn?stopCam():startCam(); };
function startCam(){
  if(typeof Html5Qrcode==="undefined"){ $("camToggle").textContent="Camera unavailable — type reference"; return; }
  scanner=new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:240}},onDecode,function(){})
    .then(function(){camOn=true;$("camToggle").textContent="Stop camera";})
    .catch(function(){$("camToggle").textContent="Can't open camera — type reference";});
}
function stopCam(){ if(scanner&&camOn){ scanner.stop().then(function(){camOn=false;$("camToggle").textContent="Start camera";try{scanner.clear();}catch(e){}}).catch(function(){}); } }
function onDecode(text){ if(busy)return; busy=true; stopCam(); var p=parseTicket(text); lookup(p.id,p.token); }
function parseTicket(text){ text=String(text||"").trim();
  if(text.indexOf("b=")>-1){ try{ var qs=text.substring(text.indexOf("?")+1); var pr=new URLSearchParams(qs); if(pr.get("b")) return {id:pr.get("b"),token:pr.get("t")||""}; }catch(e){} }
  return {id:text,token:""};
}
$("manual").addEventListener("keydown",function(e){ if(e.key==="Enter") $("lookupBtn").click(); });
$("lookupBtn").onclick=function(){ var v=$("manual").value.trim(); if(!v)return; busy=true; lookup(v,""); };

async function lookup(id,token){
  $("scanCard").classList.add("hidden");
  $("stage").innerHTML='<div class="review a"><div class="pay">Finding…</div></div>';
  try{
    var res=await post({action:"ticketLookup",key:KEY,id:id,token:token});
    if(!res||!res.ok){ showError(res); return; }
    CUR={id:res.booking.id,token:token};
    renderReview(res);
  }catch(e){ showError({error:"Network error — try again."}); }
}
function payText(p){ p=String(p||"").toLowerCase(); if(p==="paid")return{t:"PAID",c:"g"}; if(p==="pay_on_day")return{t:"PAY ON DAY",c:"a"}; return{t:"COLLECT PAYMENT",c:"a"}; }
function renderReview(res){
  if(res.cancelled){ showError({error:"Booking "+res.booking.id+" was CANCELLED."}); return; }
  var b=res.booking, pt=payText(b.pay_status);
  var warn=res.already?'<div class="warn">Already checked in'+(b.checkin_at?(" at "+esc(b.checkin_at)):"")+'</div>':'';
  var btn=res.already
    ? '<button class="btn ghost" id="nextBtn">Next guest</button>'
    : '<div class="acts"><button class="btn green" id="doCheckin">Check in \u2713</button><button class="btn ghost" id="cancelBtn">Cancel</button></div>';
  $("stage").innerHTML=warn
    +'<div class="review '+pt.c+'">'
    +'<div class="pay">'+pt.t+'</div>'
    +'<div class="who">'+esc(b.name)+'</div>'
    +(res.show?'<div class="det">'+esc(res.show.title)+'</div>':'')
    +'<div class="seatline">'+esc(b.count)+' seat(s) · '+esc(b.seats)+'</div>'
    +'<div class="det">Ref '+esc(b.id)+'</div>'
    +'</div>'+btn;
  if($("doCheckin")) $("doCheckin").onclick=confirmCheckin;
  if($("cancelBtn")) $("cancelBtn").onclick=reset;
  if($("nextBtn")) $("nextBtn").onclick=reset;
}
async function confirmCheckin(){
  var btn=$("doCheckin"); btn.disabled=true; btn.textContent="Checking in…";
  try{
    var res=await post({action:"checkin",key:KEY,id:CUR.id,token:CUR.token});
    if(res&&res.ok){
      var b=res.booking;
      $("stage").innerHTML='<div class="result g"><div class="status">CHECKED IN \u2713</div><div style="font-size:19px;font-weight:700;margin-top:6px">'+esc(b.name)+'</div><div class="det" style="margin-top:2px">'+esc(b.count)+' seat(s) · '+esc(b.seats)+'</div></div><button class="btn dark" id="nextBtn">Next guest</button>';
      $("nextBtn").onclick=reset;
    } else { showError(res); }
  }catch(e){ showError({error:"Network error — try again."}); }
}
function showError(res){
  $("stage").innerHTML='<div class="result r"><div class="status">'+((res&&res.error&&res.error.indexOf("CANCEL")>-1)?"CANCELLED":"NOT FOUND")+'</div><div class="det" style="margin-top:6px">'+esc((res&&res.error)||"Unknown error")+'</div></div><button class="btn dark" id="nextBtn">Try again</button>';
  $("nextBtn").onclick=reset;
}
function reset(){ $("stage").innerHTML=""; $("scanCard").classList.remove("hidden"); $("manual").value=""; busy=false; CUR=null; }
</script>
</body>
</html>
