name: Publish data snapshot

# Bakes the Google Sheet into a static data.json so the public site loads instantly
# (Jamstack). The editor still writes to the Sheet live; this just refreshes the snapshot.

on:
  workflow_dispatch:                 # manual "Run workflow" button
  repository_dispatch:               # optional: trigger from outside (event type: rebuild)
    types: [rebuild]
  schedule:
    - cron: '*/10 * * * *'           # auto-refresh roughly every 10 minutes

permissions:
  contents: write

concurrency:
  group: publish-data
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest data from the Google Sheet
        env:
          APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyUoOwvu32QbKPaLIueyJFFSqft0b7qoASYEImHE3Mj-kRBxphaLbm1yyuXigFfiDKDrw/exec"
        run: |
          set -e
          curl -fsSL "$APPS_SCRIPT_URL" -o data.new.json
          # Make sure we got the real payload, not a Google error/login page,
          # so we never publish a broken snapshot.
          python3 - <<'PY'
          import json
          d = json.load(open("data.new.json"))
          assert d.get("ok") is True, "payload missing ok:true (check the web app deployment)"
          print("events:", len(d.get("events", [])),
                "people:", len(d.get("people", [])),
                "gallery:", len(d.get("gallery", [])),
                "hero:", len(d.get("hero", [])))
          PY
          mv data.new.json data.json

      - name: Commit snapshot if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data change — nothing to publish."
          else
            git commit -m "chore: refresh data snapshot"
            git push
          fi
